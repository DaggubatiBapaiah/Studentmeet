<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | StudentMeet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="hidden" id="dashboardBody">
    <nav>
        <div class="logo">Admin<span>Portal</span></div>
        
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="nav-links" id="navLinks">
            <a href="index.html">View Site</a>
            <button class="btn btn-outline" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div class="flex-between mb-2">
            <h2>Project Requests</h2>
            <div id="requestStats" class="status-badge in-progress">Loading Requests...</div>
        </div>

        <div id="requestGrid" class="grid grid-3">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
